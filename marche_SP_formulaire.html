<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marche au profit de la sclérose en plaques – Programme ETNA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --uni-bleu: #003478;
      --uni-bleu-light: #e6ecf5;
      --uni-bleu-mid: #ccd9ee;
      --uni-jaune: #FFD100;
      --uni-orange: #FF6A00;
      --radius-md: 8px;
      --radius-lg: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #f4f6fb;
      min-height: 100vh;
      padding: 1.5rem 1rem 3rem;
    }
    .wrap { max-width: 580px; margin: 0 auto; }
    .hero {
      text-align: center;
      padding: 1.75rem 1.25rem 1.25rem;
      border-radius: var(--radius-lg);
      background: var(--uni-bleu);
      margin-bottom: 1.5rem;
      position: relative;
      overflow: hidden;
    }
    .hero-stripe {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 6px;
      background: linear-gradient(90deg, var(--uni-jaune) 50%, var(--uni-orange) 50%);
    }
    .hero-badge {
      display: inline-block;
      background: var(--uni-jaune);
      color: var(--uni-bleu);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 10px;
    }
    .hero h1 {
      font-family: 'Lora', serif;
      font-size: 22px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 6px;
      line-height: 1.35;
    }
    .hero p {
      font-size: 13px;
      color: var(--uni-jaune);
      font-weight: 500;
      letter-spacing: 0.06em;
      margin-bottom: 14px;
    }
    .form-card {
      background: #fff;
      border-radius: var(--radius-lg);
      border: 0.5px solid #dde3ee;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .section-title {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.07em;
      color: var(--uni-bleu);
      text-transform: uppercase;
      display: inline-block;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--uni-jaune);
      margin-bottom: 16px;
    }
    label.field-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #555;
      margin-bottom: 6px;
    }
    input[type="text"], input[type="date"] {
      width: 100%;
      border: 0.5px solid #c5cfe0;
      border-radius: var(--radius-md);
      padding: 10px 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: #1a1a2e;
      background: #fff;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input[type="text"]:focus, input[type="date"]:focus {
      border-color: var(--uni-bleu);
      box-shadow: 0 0 0 3px var(--uni-bleu-mid);
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    .field { margin-bottom: 12px; }
    .field:last-child { margin-bottom: 0; }
    .diag-label {
      font-size: 13px;
      font-weight: 500;
      color: #555;
      margin-bottom: 8px;
    }
    .radio-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }
    .radio-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: var(--radius-md);
      border: 0.5px solid #dde3ee;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
    }
    .radio-option:hover { background: var(--uni-bleu-light); border-color: var(--uni-bleu); }
    .radio-option.selected { background: var(--uni-bleu-light); border-color: var(--uni-bleu); }
    .radio-option input[type="radio"] {
      width: 16px; height: 16px;
      accent-color: var(--uni-bleu);
      cursor: pointer;
      flex-shrink: 0;
    }
    .radio-option span { font-size: 14px; color: #1a1a2e; }
    .btn-submit {
      width: 100%;
      background: var(--uni-orange);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      padding: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      margin-top: 0.5rem;
    }
    .btn-submit:hover { background: #e05a00; }
    .btn-submit:active { transform: scale(0.99); }
    .btn-submit:disabled { background: #ccc; cursor: not-allowed; }
    #toast {
      display: none;
      border-radius: var(--radius-md);
      padding: 12px 16px;
      font-size: 14px;
      margin-bottom: 1rem;
      text-align: center;
      font-weight: 500;
    }
    .succes-view {
      display: none;
      text-align: center;
      background: #fff;
      border-radius: var(--radius-lg);
      border: 0.5px solid #dde3ee;
      padding: 2rem 1.25rem;
      margin-bottom: 1rem;
    }
    .succes-icon {
      width: 64px; height: 64px;
      background: var(--uni-bleu);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      font-size: 30px;
      color: var(--uni-jaune);
    }
    .succes-view h2 {
      font-family: 'Lora', serif;
      font-size: 22px;
      color: var(--uni-bleu);
      margin-bottom: 8px;
    }
    .succes-view p {
      font-size: 14px;
      color: #666;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }
    .btn-nouveau {
      background: var(--uni-bleu);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      padding: 12px 28px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-nouveau:hover { background: #002460; }
    .footer {
      text-align: center;
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 0.5px solid #dde3ee;
    }
    .btn-admin {
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      color: #bbb;
      padding: 4px 8px;
    }
    .btn-admin:hover { color: var(--uni-bleu); }
    @media (max-width: 480px) {
      .row { grid-template-columns: 1fr; }
      .radio-group { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="hero">
      <div class="hero-badge">31 mai 2025</div>
      <h1>Marche au profit de la<br>sclérose en plaques</h1>
      <p>Programme ETNA</p>
      <div class="hero-stripe"></div>
    </div>

    <div id="toast"></div>

    <div id="formView">
      <div class="form-card">
        <div class="section-title">Informations personnelles</div>
        <div class="row">
          <div class="field">
            <label class="field-label">Nom *</label>
            <input type="text" id="nom" placeholder="Dupont" />
          </div>
          <div class="field">
            <label class="field-label">Prénom *</label>
            <input type="text" id="prenom" placeholder="Marie" />
          </div>
        </div>
        <div class="field">
          <label class="field-label">Date de naissance *</label>
          <input type="date" id="ddn" />
        </div>
      </div>

      <div class="form-card">
        <div class="section-title">Informations médicales</div>
        <div class="diag-label">Avez-vous un diagnostic de sclérose en plaques ? *</div>
        <div class="radio-group">
          <label class="radio-option" id="opt-oui" onclick="selectDiag('Oui', this)">
            <input type="radio" name="diag" value="Oui" />
            <span>J'ai le diagnostic</span>
          </label>
          <label class="radio-option" id="opt-non" onclick="selectDiag('Non', this)">
            <input type="radio" name="diag" value="Non" />
            <span>Je n'ai pas le diagnostic</span>
          </label>
        </div>
        <div class="field">
          <label class="field-label">Nom de votre neurologue</label>
          <input type="text" id="neurologue" placeholder="Dr. Tremblay" />
        </div>
      </div>

      <button class="btn-submit" id="btnSoumettre" onclick="soumettre()">✓ &nbsp;Soumettre ma participation</button>
    </div>

    <div class="succes-view" id="succesView">
      <div class="succes-icon">✓</div>
      <h2>Merci !</h2>
      <p id="succesMsg">Votre participation a été enregistrée avec succès.</p>
      <button class="btn-nouveau" onclick="nouvelleInscription()">Inscrire un autre participant</button>
    </div>

    <div class="footer">
      <button class="btn-admin" onclick="window.open('https://sheets.google.com', '_blank')">⚙ Voir les données</button>
    </div>

  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby5yKCCSAnroNlyOff5dfmqryNLx-L6LnDkoz_zYqQfhaqMrPqBeb0A-JmXZLNMkNpN/exec';
    let diagSelectionne = '';

    function selectDiag(val, el) {
      diagSelectionne = val;
      document.querySelectorAll('.radio-option').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
    }

    function showToast(msg, ok) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.display = 'block';
      t.style.background = ok ? '#003478' : '#c0392b';
      t.style.color = ok ? '#FFD100' : '#fff';
      setTimeout(() => { t.style.display = 'none'; }, 4000);
    }

    async function soumettre() {
      const nom = document.getElementById('nom').value.trim();
      const prenom = document.getElementById('prenom').value.trim();
      const ddn = document.getElementById('ddn').value;
      const neuro = document.getElementById('neurologue').value.trim();

      if (!nom || !prenom || !ddn) { showToast('Veuillez remplir les champs obligatoires (*)', false); return; }
      if (!diagSelectionne) { showToast('Veuillez sélectionner une option pour le diagnostic', false); return; }

      const btn = document.getElementById('btnSoumettre');
      btn.disabled = true;
      btn.textContent = 'Envoi en cours...';

      const donnees = {
        nom, prenom,
        date_naissance: ddn,
        diagnostique_sp: diagSelectionne,
        neurologue: neuro || '—',
        horodatage: new Date().toLocaleString('fr-CA')
      };

      try {
        await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(donnees)
        });

        document.getElementById('formView').style.display = 'none';
        document.getElementById('succesMsg').textContent = prenom + ' ' + nom + ', votre participation a été enregistrée avec succès. Merci !';
        document.getElementById('succesView').style.display = 'block';

      } catch (err) {
        showToast('Erreur de connexion. Vérifiez votre internet et réessayez.', false);
        btn.disabled = false;
        btn.textContent = '✓  Soumettre ma participation';
      }
    }

    function nouvelleInscription() {
      document.getElementById('nom').value = '';
      document.getElementById('prenom').value = '';
      document.getElementById('ddn').value = '';
      document.getElementById('neurologue').value = '';
      diagSelectionne = '';
      document.querySelectorAll('.radio-option').forEach(o => o.classList.remove('selected'));
      document.querySelectorAll('input[name="diag"]').forEach(r => r.checked = false);
      const btn = document.getElementById('btnSoumettre');
      btn.disabled = false;
      btn.textContent = '✓  Soumettre ma participation';
      document.getElementById('succesView').style.display = 'none';
      document.getElementById('formView').style.display = 'block';
    }
  </script>
</body>
</html>
